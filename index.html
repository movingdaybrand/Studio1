<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brand Home — concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg-1:#eef1ea;--bg-2:#f7f8f3;--bg-3:#e9ece2;
  --ink:#0d1f13;--ink-soft:rgba(13,31,19,.55);--ink-faint:rgba(13,31,19,.38);
  --sage:#2c5a3c;--sage-line:rgba(44,90,60,.1);
  --glass:rgba(255,255,255,.52);
  --r-lg:22px;--r-md:15px;--r-sm:11px;
  --shadow:0 0 0 1px rgba(44,90,60,.07),0 6px 18px rgba(20,60,36,.05);
  --shadow-hover:0 0 0 1px rgba(44,100,66,.14),0 12px 30px rgba(20,60,36,.09);
  --display:'Fraunces',Georgia,serif;--body:'Inter',-apple-system,system-ui,sans-serif;
  --b1:#1c2b22;--b2:#f3efe6;--b3:#b4915a;--b4:#4e6b5a;--b5:#0e1a14;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;min-height:100vh;font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background:radial-gradient(1100px 640px at 80% -10%,rgba(180,205,185,.34),transparent 60%),radial-gradient(820px 560px at 6% 110%,rgba(196,214,198,.28),transparent 55%),linear-gradient(160deg,var(--bg-1),var(--bg-2) 46%,var(--bg-3));}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
:focus-visible{outline:2px solid var(--sage);outline-offset:3px;border-radius:6px;}

.env{max-width:1040px;margin:0 auto;padding:clamp(14px,2.2vw,30px);}
.glasspane{position:relative;border-radius:var(--r-lg);min-height:calc(100vh - 60px);
  background:linear-gradient(160deg,rgba(255,255,255,.62),rgba(255,255,255,.4));
  backdrop-filter:blur(40px) saturate(170%);-webkit-backdrop-filter:blur(40px) saturate(170%);
  box-shadow:var(--shadow);padding:clamp(20px,3vw,40px);display:flex;flex-direction:column;}

/* reusable clipping-mask container */
.vframe{position:relative;overflow:hidden;border-radius:var(--r-md);background:rgba(255,255,255,.5);box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s ease;}
.vframe:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.vframe>img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.vframe.contain>img{object-fit:contain;padding:14%;}
.vframe-tag{position:absolute;left:11px;bottom:9px;z-index:2;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--ink-soft);background:rgba(255,255,255,.8);padding:3px 7px;border-radius:6px;backdrop-filter:blur(6px);}
.vframe-tag.on-dark{color:rgba(243,239,230,.82);background:rgba(8,20,12,.32);}

/* views */
.view{display:none;zoom:.9;}
.view.show{display:block;margin:auto 0;animation:viewIn .42s cubic-bezier(.22,1,.36,1) both;}
@keyframes viewIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

/* HOME */
.home-head{text-align:center;margin:clamp(12px,4vh,40px) 0 clamp(18px,3.5vh,32px);}
.kicker{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;}
.welcome{font-family:var(--display);font-weight:300;font-size:clamp(28px,3.8vw,40px);letter-spacing:-.02em;margin:.26em 0 .14em;}
.welcome .soft{color:var(--ink-faint);}
.welcome-sub{color:var(--ink-soft);font-weight:300;font-size:14px;}
.home-logo{display:flex;justify-content:center;margin:0 0 16px;}
.home-logo img{height:46px;max-width:200px;object-fit:contain;mix-blend-mode:multiply;}
.movein{display:flex;flex-direction:column;align-items:center;gap:9px;margin-top:16px;}
.movein-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--sage);background:rgba(255,255,255,.62);box-shadow:var(--shadow);padding:9px 17px;border-radius:99px;transition:transform .2s,box-shadow .2s;}
.movein-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.movein-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.movein-status{font-size:12px;color:var(--ink-faint);min-height:1.1em;text-align:center;}
.reset-link{display:none;font-size:11px;color:var(--ink-faint);background:none;padding:4px 10px;border-radius:99px;opacity:.8;transition:opacity .2s,color .2s;margin-top:2px;}
.reset-link:not([hidden]){display:inline-flex;}
.reset-link:hover{opacity:1;color:var(--ink-soft);}
.glasspane.drag{box-shadow:0 0 0 2px var(--sage),var(--shadow);}
.glasspane.drag::after{content:'Drop your brand — zip, folder, or files';position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:300;font-size:clamp(22px,3vw,32px);color:var(--sage);background:rgba(247,248,243,.72);backdrop-filter:blur(8px);border-radius:var(--r-lg);z-index:30;pointer-events:none;}
.rooms{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(9px,1.1vw,14px);max-width:800px;margin:0 auto;}
@media(max-width:720px){.rooms{grid-template-columns:1fr 1fr;}}
@media(max-width:460px){.rooms{grid-template-columns:1fr;}}
.room-card{text-align:left;display:flex;flex-direction:column;min-height:112px;padding:clamp(13px,1.5vw,16px);border-radius:var(--r-md);background:var(--glass);backdrop-filter:blur(30px) saturate(170%);-webkit-backdrop-filter:blur(30px) saturate(170%);box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s ease,background .3s ease;position:relative;overflow:hidden;}
.room-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.66);box-shadow:var(--shadow-hover);}
.room-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.7);box-shadow:inset 0 0 0 1px var(--sage-line);}
.room-ic svg{width:18px;height:18px;stroke:rgba(20,60,36,.62);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.room-card b{display:block;font-weight:400;font-size:1rem;letter-spacing:-.01em;margin-top:auto;}
.room-card i{display:block;font-style:normal;font-size:.76rem;font-weight:300;color:var(--ink-soft);margin-top:2px;}
.room-card .go{position:absolute;top:16px;right:16px;opacity:0;transform:translateX(-4px);transition:.25s;color:var(--ink-faint);}
.room-card:hover .go{opacity:1;transform:none;}

/* ROOM chrome */
.room-top{display:flex;align-items:center;gap:14px;margin-bottom:clamp(16px,3vh,26px);}
.back{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);padding:7px 13px 7px 9px;border-radius:99px;background:rgba(255,255,255,.6);box-shadow:var(--shadow);transition:.2s;}
.back:hover{transform:translateX(-2px);color:var(--ink);}
.back svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.room-id .rk{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;}
.room-id h1{font-family:var(--display);font-weight:300;font-size:clamp(20px,2.6vw,30px);letter-spacing:-.02em;margin:.08em 0 0;}
.sect-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin:clamp(12px,1.8vh,18px) 2px 9px;}
.review{display:grid;gap:clamp(10px,1.2vw,15px);}

/* identity */
.id-hero{display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(10px,1.2vw,15px);}
@media(max-width:820px){.id-hero{grid-template-columns:1fr;}}
.id-primary{min-height:184px;background:var(--b2);display:grid;place-items:center;}
.id-primary .wm{font-family:var(--display);font-weight:400;font-size:clamp(22px,2.8vw,32px);color:var(--b1);text-align:center;line-height:1.05;}
.id-primary .wm small{display:block;font-size:.32em;letter-spacing:.32em;text-transform:uppercase;color:var(--b3);margin-top:1em;font-weight:500;}
.id-namecard{padding:clamp(20px,2.4vw,30px);border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:center;background:linear-gradient(155deg,rgba(255,255,255,.58),rgba(255,255,255,.38));backdrop-filter:blur(26px) saturate(170%);box-shadow:var(--shadow);}
.id-namecard .lab{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:12px;}
.id-name{font-family:var(--display);font-weight:400;font-size:clamp(26px,3vw,38px);line-height:1.02;letter-spacing:-.02em;outline:none;border-radius:6px;}
.id-name:focus{box-shadow:0 0 0 2px rgba(44,90,60,.22);}
.id-tag{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(15px,1.5vw,18px);color:var(--ink-soft);margin-top:12px;max-width:30ch;outline:none;border-radius:6px;line-height:1.3;}
.id-tag:focus{box-shadow:0 0 0 2px rgba(44,90,60,.22);}
.edit-hint{font-size:10px;color:var(--ink-faint);margin-top:16px;display:none;}
.editing .edit-hint{display:block;}
.id-marks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(10px,1.2vw,15px);}
@media(max-width:640px){.id-marks{grid-template-columns:1fr 1fr;}}
.markframe{aspect-ratio:4/3;display:grid;place-items:center;}
.markframe.dark{background:var(--b1);}.markframe.brand{background:var(--b4);}.markframe.paper{background:var(--b2);}
.mono{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;font-family:var(--display);font-weight:500;font-size:24px;}
.mono.fill{background:var(--b3);color:var(--b1);}.mono.line{box-shadow:inset 0 0 0 2px var(--b2);color:var(--b2);}
.wordmark-mini{font-family:var(--display);font-size:20px;color:var(--b1);text-align:center;}
.wordmark-mini small{display:block;font-size:.36em;letter-spacing:.28em;text-transform:uppercase;color:var(--b3);margin-top:.6em;}
.id-colors{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(8px,1vw,12px);}
.swatch{aspect-ratio:1;border-radius:var(--r-sm);position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s ease;cursor:pointer;}
.swatch:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.swatch span{position:absolute;left:10px;bottom:9px;font-size:9px;font-weight:600;}
.swatch .hex{position:absolute;left:10px;top:9px;font-size:8px;font-family:ui-monospace,monospace;opacity:.7;}

/* assets gallery */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(9px,1.1vw,13px);}
@media(max-width:820px){.gallery{grid-template-columns:1fr 1fr;}}
.gframe{aspect-ratio:1;}
.ph{width:100%;height:100%;}
.ph.a{background:linear-gradient(135deg,#2c5a3c,#4e6b5a);}
.ph.b{background:linear-gradient(135deg,#b4915a,#e4cfa6);}
.ph.c{background:linear-gradient(135deg,#1c2b22,#36493c);}
.ph.d{background:linear-gradient(135deg,#cdd9cd,#eef1ea);}
.glogo{background:var(--b2);display:grid;place-items:center;}
.glogo .wordmark-mini{font-size:18px;}

/* typography specimen */
.spec{padding:clamp(20px,2.6vw,34px);border-radius:var(--r-md);background:linear-gradient(155deg,rgba(255,255,255,.6),rgba(255,255,255,.38));backdrop-filter:blur(26px) saturate(170%);box-shadow:var(--shadow);}
.spec .big{font-family:var(--display);font-weight:300;font-size:clamp(30px,4.4vw,56px);line-height:.96;letter-spacing:-.03em;color:var(--b1);}
.spec .scale{display:flex;gap:18px;flex-wrap:wrap;align-items:baseline;margin:18px 0;color:var(--b1);font-family:var(--display);}
.spec .body{max-width:62ch;color:var(--ink-soft);font-size:14px;line-height:1.65;font-weight:300;}
.pairline{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;font-size:11px;color:var(--ink-faint);}
.pairline b{font-weight:500;color:var(--ink-soft);}

/* deliverables vault */
.vault{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(9px,1.1vw,13px);}
@media(max-width:720px){.vault{grid-template-columns:1fr 1fr;}}
.vaultcard{padding:clamp(16px,1.8vw,22px);border-radius:var(--r-md);min-height:108px;display:flex;flex-direction:column;background:linear-gradient(160deg,rgba(255,255,255,.58),rgba(255,255,255,.38));backdrop-filter:blur(26px) saturate(170%);box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s ease;cursor:pointer;}
.vaultcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.vaultcard b{font-family:var(--display);font-weight:400;font-size:1.2rem;margin-top:auto;}
.vaultcard i{font-style:normal;font-size:.74rem;color:var(--ink-soft);margin-top:2px;}
.vaultcard .vic{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--b3);font-weight:600;}

/* guide hero */
.guidehero{min-height:260px;border-radius:var(--r-md);overflow:hidden;background:var(--b1);color:var(--b2);position:relative;box-shadow:var(--shadow);padding:clamp(26px,4vw,44px);display:flex;flex-direction:column;justify-content:flex-end;}
.guidehero .ge{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--b3);font-weight:500;}
.guidehero h2{font-family:var(--display);font-weight:300;font-size:clamp(30px,4.4vw,56px);line-height:.98;letter-spacing:-.03em;margin:.18em 0 0;}
.guidehero p{font-family:var(--display);font-style:italic;font-weight:300;color:rgba(243,239,230,.68);max-width:34ch;margin-top:.5em;font-size:clamp(15px,1.6vw,20px);}

/* full guide document (the only room that renders the guide) */
.guidedoc{background:var(--b2);color:var(--b1);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow);}
.gd-hero{background:var(--b1);color:var(--b2);padding:clamp(24px,4vw,44px);}
.gd-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--b3);font-weight:500;}
.gd-title{font-family:var(--display);font-weight:300;font-size:clamp(32px,5vw,60px);letter-spacing:-.03em;line-height:1;margin:.18em 0 0;}
.gd-tag{font-family:var(--display);font-style:italic;font-weight:300;color:rgba(243,239,230,.7);font-size:clamp(15px,1.6vw,19px);margin-top:.5em;}
.gd-meta{display:flex;gap:26px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid rgba(243,239,230,.16);}
.gd-meta b{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(243,239,230,.5);font-weight:500;margin-bottom:2px;}
.gd-meta span{font-size:12.5px;color:var(--b2);}
.gd-section{padding:clamp(20px,3.2vw,34px);border-top:1px solid rgba(28,43,34,.1);}
.gd-num{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--b3);font-weight:600;margin-bottom:16px;}
.gd-logos{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:9px;}
.gd-logocell{min-height:112px;display:grid;place-items:center;border-radius:var(--r-sm);}
.gd-logocell.paper{background:#fff;}.gd-logocell.dark{background:var(--b1);}.gd-logocell.brand{background:var(--b4);}
.wm-doc{font-family:var(--display);font-size:clamp(17px,2vw,25px);color:var(--b1);text-align:center;}
.wm-doc small{display:block;font-size:.32em;letter-spacing:.3em;text-transform:uppercase;color:var(--b3);margin-top:.9em;}
.gd-palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.gd-sw{border-radius:var(--r-sm);aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
.gd-sw span{font-size:11px;font-weight:600;}.gd-sw i{font-style:normal;font-size:9px;font-family:ui-monospace,monospace;opacity:.7;margin-top:2px;}
.gd-type{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.gd-typelabel{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--b3);font-weight:600;margin-bottom:9px;}
.gd-disp{font-family:var(--display);font-weight:300;font-size:clamp(28px,4vw,44px);line-height:1;letter-spacing:-.02em;}
.gd-bodysample{font-size:14px;line-height:1.6;color:rgba(28,43,34,.7);}
.gd-fname{display:inline-block;margin-top:10px;font-size:12px;color:var(--b3);}
.gd-mockups{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.gd-mock{aspect-ratio:1;border-radius:var(--r-sm);}
.gd-usage{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gd-use{padding:16px 18px;border-radius:var(--r-sm);background:#fff;border-top:2px solid var(--b4);}
.gd-use.dont{border-top-color:#9c3c3c;}
.gd-use b{font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
.gd-use.do b{color:var(--b4);}.gd-use.dont b{color:#9c3c3c;}
.gd-use ul{list-style:none;padding:0;margin:11px 0 0;display:grid;gap:6px;font-size:13px;color:rgba(28,43,34,.72);}
.gd-files{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.gd-file{text-align:left;padding:15px 17px;border-radius:var(--r-sm);background:#fff;box-shadow:var(--shadow);cursor:pointer;transition:transform .25s,box-shadow .25s;}
.gd-file:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.gd-file b{display:block;font-weight:500;font-size:.9rem;}
.gd-file span{font-size:11px;color:var(--b3);}
@media(max-width:640px){.gd-type,.gd-logos{grid-template-columns:1fr;}.gd-mockups{grid-template-columns:1fr 1fr;}.gd-usage,.gd-files{grid-template-columns:1fr;}}

/* founder list */
.flist{display:grid;gap:9px;max-width:580px;}
.frow{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--r-sm);background:rgba(255,255,255,.5);box-shadow:var(--shadow);}
.frow b{font-weight:400;font-size:.94rem;}.frow i{font-style:normal;font-size:.76rem;color:var(--ink-faint);}
.toggle{width:38px;height:22px;border-radius:99px;background:rgba(44,90,60,.16);position:relative;flex:0 0 auto;}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .22s cubic-bezier(.22,1,.36,1);}
.toggle{cursor:pointer;transition:background .22s ease;}
.toggle.on{background:var(--sage);}
.toggle.on::after{left:19px;}
.note{margin-top:clamp(16px,2.4vh,26px);font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.55;max-width:58ch;margin-left:auto;margin-right:auto;}
/* every container in a room is editable — quiet hover affordance */
.vframe,.swatch,.gd-sw{cursor:pointer;}
.gd-sw{position:relative;}
.vframe::after,.swatch::after,.gd-sw::after{content:'Replace';position:absolute;top:8px;right:8px;z-index:4;font-size:9px;letter-spacing:.02em;color:var(--ink-soft);background:rgba(255,255,255,.86);backdrop-filter:blur(6px);padding:3px 8px;border-radius:99px;opacity:0;transform:translateY(-3px);transition:opacity .2s,transform .2s;box-shadow:inset 0 0 0 1px rgba(44,90,60,.1);pointer-events:none;}
.swatch::after,.gd-sw::after{content:'Color';}
.editing .vframe:hover::after,.editing .swatch:hover::after,.editing .gd-sw:hover::after{opacity:1;transform:none;}
[contenteditable="true"]{outline:none;border-radius:6px;transition:box-shadow .15s;}
[contenteditable="true"]:hover{box-shadow:0 0 0 1px rgba(44,90,60,.16);}
[contenteditable="true"]:focus{box-shadow:0 0 0 2px rgba(44,90,60,.25);}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}html{scroll-behavior:auto;}}

/* ── connected Brand Home: hierarchy, header, toast, deliverables, asset roles ── */
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,1.4vw,16px);max-width:680px;margin:0 auto clamp(10px,1.6vh,16px);}
@media(max-width:560px){.home-actions{grid-template-columns:1fr;}}
.primary-card{position:relative;text-align:left;padding:clamp(18px,2.2vw,26px);border-radius:var(--r-md);min-height:128px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px;
  background:linear-gradient(160deg,rgba(255,255,255,.72),rgba(255,255,255,.46));backdrop-filter:blur(34px) saturate(180%);-webkit-backdrop-filter:blur(34px) saturate(180%);
  box-shadow:var(--shadow);transition:transform .5s cubic-bezier(.22,1,.36,1),box-shadow .5s ease,background .5s ease;overflow:hidden;}

const MDWorkspaceState={

function assignRoles(){
  brand.logos.forEach(l=>{ if(!l.id) l.id=newId(); });
  brand.photos.forEach(p=>{ if(!p.id) p.id=newId(); if(!p.role) p.role='photography'; });
  brand.docs.forEach(d=>{ if(!d.id) d.id=newId(); if(!d.role) d.role=/guide|brand/i.test(d.name||'')?'guideline':'document'; });
  const L=brand.logos;
  if(L.length && !L.some(l=>l.role==='primaryLogo')){ (L.find(l=>/primary|^logo|wordmark/i.test(l.name||''))||L[0]).role='primaryLogo'; }
  const free=l=>!l.role;
  if(!L.some(l=>l.role==='iconMark')){ const x=L.find(l=>free(l)&&/icon|mark|symbol|emblem/i.test(l.name||'')); if(x) x.role='iconMark'; }
  if(!L.some(l=>l.role==='wordmark')){ const x=L.find(l=>free(l)&&/wordmark|logotype/i.test(l.name||'')); if(x) x.role='wordmark'; }

function projectWorkspaceState(){

  S.colors=brand.colors.map(c=>({hex:c.hex,name:c.name}));
  const t=brand.type||{};
  S.typography={displayFont:t.display||'',bodyFont:t.body||'',displayNote:t.displayUsage||'',bodyNote:t.bodyUsage||''};
  const A=[];
  brand.logos.forEach(l=>{ if(!l.id) l.id=newId(); A.push({id:l.id,name:l.name,ext:l.ext,category:'logo',role:l.role||''}); });
  brand.photos.forEach(p=>{ if(!p.id) p.id=newId(); A.push({id:p.id,name:p.name,ext:p.ext,category:'photo',role:p.role||'photography'}); });
  brand.docs.forEach(d=>{ if(!d.id) d.id=newId(); A.push({id:d.id,name:d.name,ext:d.ext,category:'document',role:d.role||'document'}); });
  S.assets=A;
  const byRole=r=>(brand.logos.find(l=>l.role===r)||{}).id||'';
  S.identity={primaryLogoId:byRole('primaryLogo'),secondaryLogoId:byRole('secondaryLogo'),iconMarkId:byRole('iconMark'),wordmarkId:byRole('wordmark')};
  S.deliverables={htmlReady:!!brand.name,pdfReady:!!brand.name,zipReady:(brand.logos.length+brand.photos.length)>0};

function updateWorkspaceState(patch={},options={}){

    let n=a.name||fallback; if(!/\.[a-z0-9]+$/i.test(n)) n+='.'+(a.ext||'png'); folder.file(n,m[1],{base64:true}); };

function scoreForVision(n){ n=n.toLowerCase(); let s=0;
  if(/logo|wordmark|icon|mark|brand|symbol|emblem/.test(n)) s+=5;
  if(/\.svg$/.test(n)) s+=2; if(/\.png$/.test(n)) s+=1;
  if(/photo|image|img|dsc|banner|hero|cover|background|screenshot/.test(n)) s-=3;
  return s; }
function prepDataUrl(im){            // rasterize SVGs + flatten transparency so the vision model can see them
  return new Promise(res=>{
    if(im.ext!=='svg' && /^data:image\/(png|jpeg|jpg|webp)/i.test(im.url)) return res(im.url);
    try{ const img=new Image();
      img.onload=()=>{ try{ const max=1024; let w=img.width||512,h=img.height||512; const sc=Math.min(1,max/Math.max(w,h));
          w=Math.round(w*sc); h=Math.round(h*sc); const c=document.createElement('canvas'); c.width=w; c.height=h;
          const x=c.getContext('2d'); x.fillStyle='#808080'; x.fillRect(0,0,w,h); x.drawImage(img,0,0,w,h); res(c.toDataURL('image/png'));
        }catch(e){ res(im.url); } };
      img.onerror=()=>res(im.url); img.src=im.url;
    }catch(e){ res(im.url); }
  });
}
async function requestReview(assets){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),60000);
  try{
    const res=await fetch('/api/analyze-brand-files',{method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,
      body:JSON.stringify({preparationReport:{preparedFileCount:assets.length,assets:assets.map(a=>({uploadId:a.id,category:a.category}))},assets})});
    if(!res.ok) throw new Error('route '+res.status);
    return await res.json();
  } finally { clearTimeout(t); }
}
function mapAiToBrand(d){            // map the AI's response into the brand the rooms read from
  if(!d||typeof d!=='object') return false;
  const g=d.guide||{}, br=d.brand||{};
  const nm=g.clientName||br.name; if(nm) brand.name=String(nm);
  const tag=g.description||(d.copySuggestions&&d.copySuggestions.tagline)||br.positioning||d.voice||d.tone;
  if(tag) brand.tagline=String(tag);
  const cat=g.category||br.industry; if(cat) brand.category=String(cat);
  const pal=dedupeColors((d.palette||d.colors||[]).map(c=>({hex:normHex(c),name:(c&&c.name)||'Color'})).filter(c=>c.hex)).slice(0,5);
  if(pal.length) brand.colors=pal;
  const ty=d.typography||{};
  const disp=ty.displayFont||(ty.display&&ty.display.name)||''; const body=ty.bodyFont||(ty.body&&ty.body.name)||'';
  if(disp||body) brand.type={display:disp,displayUsage:(ty.display&&ty.display.usage)||'',body:body,bodyUsage:(ty.body&&ty.body.usage)||''};
  const rep=Array.isArray(d.assetReport)?d.assetReport:[];     // let an AI-flagged primary logo lead
  if(rep.length && brand.logos.length){
    const p=rep.find(a=>/primary|lead|logo|wordmark/i.test(a.assetRole||a.role||''));
    if(p&&p.name){ const idx=brand.logos.findIndex(l=>l.name===p.name); if(idx>0){ const [x]=brand.logos.splice(idx,1); brand.logos.unshift(x); } }
  }

}
const IMG_EXT=['png','jpg','jpeg','webp','gif','svg'], DOC_EXT=['pdf','key','ppt','pptx','doc','docx','txt'];
async function collectFromZip(file){
  const zip=await JSZip.loadAsync(file);
  const entries=Object.values(zip.files).filter(f=>!f.dir && !/(^|\/)(__MACOSX\/|\.)/.test(f.name));
  const imgs=[], docs=[];
  for(const f of entries){
    const base=f.name.split('/').pop(); if(!base) continue;
    const ext=(base.split('.').pop()||'').toLowerCase();
    if(IMG_EXT.includes(ext)){
      const b64=await f.async('base64'); const mime=ext==='svg'?'image/svg+xml':'image/'+(ext==='jpg'?'jpeg':ext);
      imgs.push({name:base,url:'data:'+mime+';base64,'+b64,ext});
    } else if(DOC_EXT.includes(ext)){ docs.push({name:base,ext}); }
  }
  const tops=[...new Set(entries.map(f=>f.name.includes('/')?f.name.split('/')[0]:null).filter(Boolean))];
  return {imgs,docs,top:tops.length===1?prettify(tops[0]):''};
}
function fileToImg(file){ return new Promise(res=>{ const r=new FileReader();
  r.onload=()=>res({name:(file.name||'image').split('/').pop(),url:r.result,ext:((file.name||'').split('.').pop()||'').toLowerCase()});
  r.onerror=()=>res(null); r.readAsDataURL(file); }); }
/* dropped-folder support: flatten directory entries into a flat File list */
function entryFile(en){ return new Promise(res=>{ try{ en.file(f=>res(f),()=>res(null)); }catch(e){ res(null); } }); }
function readDir(rd){ return new Promise(res=>{ try{ rd.readEntries(es=>res(es||[]),()=>res([])); }catch(e){ res([]); } }); }
async function walkEntry(en,out,depth){
  if(!en||depth>12) return;
  if(en.isFile){ const f=await entryFile(en); if(f) out.push(f); }
  else if(en.isDirectory){ const rd=en.createReader(); let batch; do{ batch=await readDir(rd); for(const e of batch) await walkEntry(e,out,depth+1); }while(batch.length); }
}
async function moveInFiles(fileList){
  if(typeof JSZip==='undefined'){ setStatus('Still loading — try again in a second.'); return; }
  const files=Array.from(fileList||[]).filter(Boolean);
  if(!files.length) return;
  setStatus('Moving in '+files.length+' item'+(files.length===1?'':'s')+'…');
  const imgs=[]; brand.docs=[]; let folderName='';
  for(const f of files){
    const name=f.name||''; const ext=(name.split('.').pop()||'').toLowerCase();
    if(f.webkitRelativePath && f.webkitRelativePath.includes('/') && !folderName) folderName=prettify(f.webkitRelativePath.split('/')[0]);
    if(ext==='zip' || /zip/.test(f.type||'')){
      try{ const z=await collectFromZip(f); imgs.push(...z.imgs); brand.docs.push(...z.docs); if(!folderName&&z.top) folderName=z.top; }
      catch(e){ console.warn('zip failed',name,e); }
    } else if(IMG_EXT.includes(ext)){ const im=await fileToImg(f); if(im) imgs.push(im); }
    else if(DOC_EXT.includes(ext)){ brand.docs.push({name:name.split('/').pop(),ext}); }
  }

}
function loadImg(url){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; }); }
function dedupeColors(list){            // drop identical + near-identical so no duplicates slip through
  const out=[];
  for(const c of list){
    const h=normHex(c&&c.hex!==undefined?c.hex:c); if(!h) continue;
    const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    if(out.some(o=>Math.abs(o.r-r)+Math.abs(o.g-g)+Math.abs(o.b-b)<36)) continue;
    out.push({hex:h,name:(c&&c.name)||'Color',r,g,b});
  }
  return out.map(o=>({hex:o.hex,name:o.name}));
}
async function extractPalette(urls){            // EXACT hex codes pulled from the uploaded pixels — nothing averaged or invented
  const counts=new Map();
  for(const url of urls.slice(0,6)){
    let img; try{ img=await loadImg(url); }catch(e){ continue; }
    const S=64, c=document.createElement('canvas'); c.width=S; c.height=S; const x=c.getContext('2d');
    try{ x.drawImage(img,0,0,S,S); }catch(e){ continue; }
    let d; try{ d=x.getImageData(0,0,S,S).data; }catch(e){ continue; }
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]<250) continue;                                   // fully opaque only → real fills, not anti-aliased edges
      const r=d[i],g=d[i+1],b=d[i+2];
      if(r>=245&&g>=245&&b>=245) continue;                       // ignore white/paper background
      const key=(r<<16)|(g<<8)|b; counts.set(key,(counts.get(key)||0)+1);   // count EXACT colours
    }
  }
  const sorted=[...counts.entries()].sort((a,b)=>b[1]-a[1])
    .map(([k])=>({hex:'#'+[(k>>16)&255,(k>>8)&255,k&255].map(n=>n.toString(16).padStart(2,'0')).join('')}));
  const names=['Primary','Secondary','Accent','Tint','Deep'];
  return dedupeColors(sorted).slice(0,5).map((c,i)=>({hex:c.hex,name:names[i]||('Color '+(i+1))}));
}
async function finishIntake(imgs,folderName){
  // baseline local sort — also the fallback if the AI route isn't reachable
  brand.logos=[]; brand.photos=[];
  imgs.forEach(im=>{ (/(logo|mark|icon|brand|wordmark|symbol|emblem)/i.test(im.name)||im.ext==='svg') ? brand.logos.push(im) : brand.photos.push(im); });
  if(!brand.logos.length && imgs.length){ brand.logos=imgs.slice(0,4); brand.photos=imgs.slice(4); }
  if(folderName && !brand.name) brand.name=folderName;
  const total=imgs.length+brand.docs.length;

  // prep the images once — used for both the AI call and the local colour read
  let urls=null;
  if(imgs.length){
    const picked=[...imgs].sort((a,b)=>scoreForVision(b.name)-scoreForVision(a.name)).slice(0,14);
    urls=await Promise.all(picked.map(prepDataUrl));
    setStatus('Reading your brand…');
    let aiOK=false;
    try{
      const assets=picked.map((im,i)=>({ id:'asset_'+(i+1), name:im.name,
        type:(/^data:([^;,]+)/.exec(urls[i]||'')||[])[1]||('image/'+im.ext),
        category:im.ext==='svg'?'logo':'image', dataUrl:urls[i] }));
      aiOK=mapAiToBrand(await requestReview(assets));
    }catch(e){ console.warn('Brand Concierge unavailable — organized locally:',e); }
    // colours come from the actual uploads even when the AI didn't run/return them
    if(!brand.colors.length){ try{ const pal=await extractPalette(urls); if(pal.length) brand.colors=pal; }catch(e){} }
    setStatus(total
      ? (aiOK ? (brand.name?brand.name+' is moved in — rooms set from your brand.':'Moved in — rooms set from your brand.')
              : (brand.colors.length?`${total} file${total===1?'':'s'} moved in — colours read from your logos (full AI runs on your live site).`
                                     :`${total} file${total===1?'':'s'} moved in — organized locally (AI runs on your live site).`))
      : 'Nothing readable found — try images, a PDF, a folder, or a .zip.');
  } else {
    setStatus(total? `${total} file${total===1?'':'s'} moved in.` : 'Nothing readable found — try images, a PDF, a folder, or a .zip.');
  }
  assignRoles();
  if(currentRoom && room.classList.contains('show')) openRoom(currentRoom);
  applyBrandHome();
  projectWorkspaceState();
  saveBrand();
  refreshFounderState();
  if(total) announceWorkspaceUpdate(brand.name? brand.name+' has moved in. Everything has a place.' : 'Your brand has moved in. Everything has a place.','intake');
}

const SAVE_DB='mdBrandHomeSave', SAVE_STORE='brand', SAVE_KEY='current';
function _db(){return new Promise((res,rej)=>{ if(typeof indexedDB==='undefined') return rej(new Error('no idb')); const r=indexedDB.open(SAVE_DB,1); r.onupgradeneeded=()=>{ try{r.result.createObjectStore(SAVE_STORE);}catch(e){} }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });}

/* ════════════════ INTAKE BRIDGE: receive what experience.html prepared ════════════════
   experience.html writes the analysis to localStorage('movingDay_brandDNA_v1') and the real
   files (with role/folder) to IndexedDB('movingDayBridge' → store 'assets', keyPath 'idx').
   We read both, populate the rooms, persist into Brand Home's own store, then clear the bridge. */
const BRIDGE_DB='movingDayBridge', BRIDGE_STORE='assets', BRIDGE_DB_VER=1, BRAND_DNA_KEY='movingDay_brandDNA_v1';
function bridgeOpen(){ return new Promise((res,rej)=>{ if(typeof indexedDB==='undefined') return rej(new Error('no idb'));
  const r=indexedDB.open(BRIDGE_DB,BRIDGE_DB_VER);
  r.onupgradeneeded=()=>{ try{ const db=r.result; if(!db.objectStoreNames.contains(BRIDGE_STORE)) db.createObjectStore(BRIDGE_STORE,{keyPath:'idx'}); }catch(e){} };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function bridgeReadAll(){ return bridgeOpen().then(db=>new Promise(res=>{
  const out=[]; try{ const st=db.transaction(BRIDGE_STORE,'readonly').objectStore(BRIDGE_STORE);
    if(st.getAll){ const rq=st.getAll(); rq.onsuccess=()=>{ res(rq.result||[]); try{db.close();}catch(e){} }; rq.onerror=()=>{ res([]); try{db.close();}catch(e){} }; }
    else { const cur=st.openCursor(); cur.onsuccess=e=>{ const c=e.target.result; if(c){ out.push(c.value); c.continue(); } else { res(out); try{db.close();}catch(_){} } }; cur.onerror=()=>{ res(out); try{db.close();}catch(_){} }; }
  }catch(e){ res([]); try{db.close();}catch(_){} } })).catch(()=>[]); }
function bridgeClear(){ return bridgeOpen().then(db=>new Promise(res=>{ try{ const tx=db.transaction(BRIDGE_STORE,'readwrite'); tx.objectStore(BRIDGE_STORE).clear(); tx.oncomplete=()=>{res();try{db.close();}catch(e){}}; tx.onerror=()=>{res();try{db.close();}catch(e){}}; }catch(e){ res(); } })).catch(()=>{}); }
function blobToDataURL(blob){ return new Promise(res=>{ if(!blob) return res(null); try{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>res(null); r.readAsDataURL(blob); }catch(e){ res(null); } }); }
function bridgeCat(rec){
  const ext=(((rec.name||'').split('.').pop())||'').toLowerCase();
  const hay=((rec.role||'')+' '+(rec.label||'')+' '+(rec.folder||'')+' '+(rec.name||'')+' '+(rec.type||'')).toLowerCase();
  if(['pdf','doc','docx','ppt','pptx','key','txt'].includes(ext)) return 'document';
  if(ext==='svg' || /logo|mark|icon|wordmark|symbol|emblem|logotype/.test(hay)) return 'logo';
  return 'photo';
}
function bridgeRole(rec){
  const hay=((rec.role||'')+' '+(rec.label||'')).toLowerCase();
  if(/primary/.test(hay)) return 'primaryLogo';
  if(/icon|mark/.test(hay)) return 'iconMark';
  if(/wordmark|logotype/.test(hay)) return 'wordmark';
  if(/secondary/.test(hay)) return 'secondaryLogo';
  return '';
}
async function importFromExperience(){
  let dna=null;

  if(!dna && !(recs&&recs.length)) return false;          // no handoff waiting
  if(dna){
    if(dna.brandName) brand.name=dna.brandName;
    if(dna.tagline) brand.tagline=dna.tagline;
    if(dna.category) brand.category=dna.category;
    if(Array.isArray(dna.colors)&&dna.colors.length)
      brand.colors=dna.colors.map(c=>({hex:normHex(c&&c.hex)||(c&&c.hex)||'',name:(c&&c.name)||'Color'})).filter(c=>c.hex).slice(0,5);
    const ty=dna.typography||{};
    const disp=(ty.display&&ty.display.name)||''; const body=(ty.body&&ty.body.name)||'';
    if(disp||body) brand.type={display:disp,displayUsage:(ty.display&&ty.display.usage)||'',body:body,bodyUsage:(ty.body&&ty.body.usage)||''};
  }
  brand.logos=[]; brand.photos=[]; brand.docs=[];
  for(const rec of (recs||[])){
    const cat=bridgeCat(rec), ext=(((rec.name||'').split('.').pop())||'').toLowerCase();
    if(cat==='document'){ brand.docs.push({id:newId(),name:rec.name||'document',ext,role:bridgeRole(rec)||'document'}); continue; }
    const url=await blobToDataURL(rec.blob); if(!url) continue;
    (cat==='logo'?brand.logos:brand.photos).push({id:newId(),name:rec.name||(cat+' asset'),url,ext,role:bridgeRole(rec)});
  }
  if(!brand.logos.length && dna){                          // no blobs crossed — use DNA's embedded logo data URLs
    [['primaryLogo','primaryLogo'],['iconMark','iconMark'],['wordmark','wordmark']].forEach(([k,role])=>{
      const m=dna[k]; if(m&&m.dataUrl) brand.logos.push({id:newId(),name:m.name||k,url:m.dataUrl,ext:((m.name||'').split('.').pop()||'png').toLowerCase(),role});
    });
  }
  if(!(brand.name||brand.logos.length||brand.photos.length||brand.colors.length)) return false;
  assignRoles();
  brand.logos.sort((x,y)=>((y.role==='primaryLogo')-(x.role==='primaryLogo')));
  projectWorkspaceState();
  applyBrandHome();
  saveBrand();
  await bridgeClear(); try{ localStorage.removeItem(BRAND_DNA_KEY); }catch(e){}
  const n=brand.logos.length+brand.photos.length+brand.docs.length;
  setStatus((brand.name?brand.name+' moved in from your intake':'Your brand moved in from intake')+(n?` — ${n} file${n===1?'':'s'} placed.`:'.'));
  setTimeout(()=>announceWorkspaceUpdate((brand.name?brand.name+' has moved in.':'Your brand has moved in.')+' Everything has a place.','intake'),300);
  return true;
}
</script>
