[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/analyze-brand-files"
  to = "/.netlify/functions/analyze-brand-files"
  status = 200

[[redirects]]
  from = "/api/smart-fill"
  to = "/.netlify/functions/smart-fill"
  status = 200

[[redirects]]
  from = "/api/render-brand-guide"
  to = "/.netlify/functions/render-brand-guide"
  status = 200
