<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brand Guide · Moving Day Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ── MOVING DAY APP SKIN — icy glass / VisionOS calm ──
   Client palette (--c1..--c5) still fills the brand content;
   the shell matches the Move In / Brand Home product look. */
:root {
  --c1: #1F3D2E;  --c2: #2D5642;  --c3: #C4D9CB;  --c4: #F1ECDF;  --c5: #15140F;
  --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --display: "Inter", system-ui, -apple-system, sans-serif;
  --serif: "Instrument Serif", Georgia, serif;
  --ink: #0A1E13;
  --ink-soft: rgba(8,28,16,.64);
  --muted: rgba(14,42,24,.56);
  --rule: rgba(44,90,60,.12);
  --field: #f3f7f3;
  --paper: #f3f7f3;
  --cream: #F1ECDF;
  --emerald: #2C784C;
  --glass: rgba(255,255,255,.66);
  --glass-soft: rgba(255,255,255,.44);
  --glass-line: rgba(44,90,60,.13);
  --radius: 24px;
  --glass-shadow:
    0 0 0 .5px rgba(255,255,255,.92),
    0 0 0 1px rgba(44,90,60,.10),
    inset 0 1px 0 rgba(255,255,255,1),
    0 4px 12px rgba(20,60,36,.06),
    0 18px 50px rgba(20,60,36,.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--field);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
  min-height: 100vh;
}
/* Frosted light atmosphere — soft depth without becoming a scene */
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(120% 82% at 16% -12%, rgba(196,217,203,.55), transparent 46%),
    radial-gradient(95% 70% at 102% -4%, rgba(241,236,223,.42), transparent 52%),
    radial-gradient(80% 85% at 50% 120%, rgba(44,120,76,.10), transparent 60%);
}
img { max-width: 100%; display: block; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(243,247,243,.6);
  backdrop-filter: blur(30px) saturate(170%); -webkit-backdrop-filter: blur(30px) saturate(170%);
  border-bottom: 1px solid rgba(44,90,60,.10);
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--sans); font-weight: 300; font-size: 15px; letter-spacing: -.02em;
  color: var(--ink); text-decoration: none;
}
.topbar-mark {
  width: 27px; height: 27px; border-radius: 9px;
  background: rgba(255,255,255,.62);
  backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
  display: flex; align-items: center; justify-content: center;
  color: var(--emerald); font-size: 12px; font-weight: 500;
  box-shadow: 0 0 0 .5px rgba(255,255,255,.95), 0 0 0 1px rgba(44,90,60,.12), 0 6px 16px rgba(20,60,36,.10);
}
.topbar-client {
  font-size: 9px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(14,42,24,.5);
}
.topbar-actions { display: flex; gap: 8px; }
.topbar-btn {
  font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  padding: 9px 15px; border-radius: 999px; cursor: pointer; text-decoration: none;
  border: 1px solid rgba(44,90,60,.16);
  background: rgba(255,255,255,.5);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  color: rgba(14,42,24,.66); font-family: var(--sans); transition: .2s;
}
.topbar-btn:hover { border-color: rgba(44,120,76,.42); color: var(--emerald); }
.topbar-btn.primary { background: rgba(31,61,46,.92); color: #eef5ef; border-color: transparent; }
.topbar-btn.primary:hover { background: var(--emerald); color: #fff; }

/* ── LAYOUT ── */
.guide { max-width: 1080px; margin: 0 auto; padding: 0 32px 110px; position: relative; z-index: 1; }

/* ── SECTION ── */
.guide-section {
  padding: 66px 0 0;
  border-top: 1px solid rgba(44,90,60,.10);
  margin-top: 64px;
}
.guide-section:first-child { border-top: 0; margin-top: 0; padding-top: 54px; }

.section-kicker {
  font-size: 9px; font-weight: 600; letter-spacing: .26em; text-transform: uppercase;
  color: var(--emerald); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-kicker::before { content: ""; width: 22px; height: 1px; background: var(--emerald); opacity: .5; }
.section-title {
  font-family: var(--sans); font-size: clamp(34px, 4.6vw, 58px);
  font-weight: 200; letter-spacing: -.035em; line-height: 1;
  color: var(--ink); margin-bottom: 16px;
}
.section-desc {
  font-size: 15px; font-weight: 300; line-height: 1.7; color: var(--muted);
  max-width: 560px; margin-bottom: 40px;
}

/* ── HERO ── */
.hero-grid { display: grid; grid-template-columns: 1fr 320px; gap: 32px; align-items: end; padding: 56px 0 0; }
.hero-copy { max-width: 640px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
  color: var(--emerald);
  background: rgba(255,255,255,.5); border: 1px solid rgba(44,90,60,.14);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 999px; padding: 7px 13px; margin-bottom: 22px;
}
.hero-name {
  font-family: var(--sans); font-size: clamp(52px, 7.6vw, 104px);
  font-weight: 200; letter-spacing: -.05em; line-height: .9;
  color: var(--ink); margin-bottom: 20px;
}
.hero-tagline { font-size: 17px; font-weight: 300; line-height: 1.6; color: var(--ink-soft); max-width: 480px; margin-bottom: 28px; }
.hero-meta { display: flex; gap: 24px; flex-wrap: wrap; }
.hero-meta-item { display: flex; flex-direction: column; gap: 3px; }
.hero-meta-label { font-size: 9px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: rgba(14,42,24,.42); }
.hero-meta-value { font-size: 13px; font-weight: 500; color: var(--ink); }

.hero-panel {
  background: var(--c1); border-radius: 28px; padding: 30px;
  color: #fff; display: flex; flex-direction: column; gap: 20px; min-height: 280px;
  box-shadow: var(--glass-shadow);
}
.hero-panel-logo { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 140px; }
.hero-panel-logo img { max-height: 80px; max-width: 100%; object-fit: contain; }
.hero-panel-logo .logo-placeholder { font-family: var(--serif); font-size: 28px; letter-spacing: -.04em; color: rgba(255,255,255,.5); font-style: italic; }
.hero-panel-bottom { display: flex; flex-direction: column; gap: 4px; }
.hero-panel-label { font-size: 9px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,.5); }
.hero-panel-sprint { font-family: var(--sans); font-size: 18px; font-weight: 300; letter-spacing: -.02em; color: #fff; }

/* ── shared glass card ── */
.logo-card, .icon-card, .type-card, .usage-card, .download-card, .color-swatch {
  border-radius: var(--radius);
  border: 1px solid var(--glass-line);
  background: var(--glass);
  backdrop-filter: blur(34px) saturate(175%); -webkit-backdrop-filter: blur(34px) saturate(175%);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
}

/* ── LOGO SECTION ── */
.logo-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }
.logo-card { display: flex; flex-direction: column; }
.logo-card-stage { flex: 1; min-height: 200px; display: flex; align-items: center; justify-content: center; padding: 32px; }
.logo-card-stage.light { background: rgba(255,255,255,.46); }
.logo-card-stage.dark  { background: #0A1E13; }
.logo-card-stage.brand { background: var(--c1); }
.logo-card-stage img { max-height: 90px; max-width: 90%; object-fit: contain; }
.logo-card-stage .logo-placeholder { font-family: var(--serif); font-size: 22px; letter-spacing: -.04em; font-style: italic; opacity: .3; }
.logo-card-info {
  padding: 16px 20px; border-top: 1px solid var(--glass-line);
  background: rgba(255,255,255,.4);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.logo-card-label { font-size: 9px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--emerald); margin-bottom: 3px; }
.logo-card-desc { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.45; max-width: 280px; }
.logo-card-tag {
  font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px; background: rgba(44,120,76,.08);
  color: var(--emerald); border: 1px solid rgba(44,90,60,.12); white-space: nowrap; flex-shrink: 0;
}
.icon-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 0; }
.icon-card { border-radius: 20px; }
.icon-stage { height: 140px; display: flex; align-items: center; justify-content: center; padding: 24px; }
.icon-stage.light { background: rgba(255,255,255,.46); }
.icon-stage.dark  { background: #0A1E13; }
.icon-stage.brand { background: var(--c1); }
.icon-stage img { max-height: 70px; max-width: 70px; object-fit: contain; }
.icon-stage .logo-placeholder { font-size: 14px; opacity: .3; }
.icon-info { padding: 12px 16px; border-top: 1px solid var(--glass-line); background: rgba(255,255,255,.4); }
.icon-info span { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }

/* ── COLOR SECTION ── */
.color-bar { display: flex; height: 100px; border-radius: 18px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--glass-line); box-shadow: var(--glass-shadow); }
.color-bar-swatch { flex: 1; position: relative; }
.color-bar-swatch span { position: absolute; bottom: 12px; left: 14px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; mix-blend-mode: overlay; color: #fff; opacity: .9; }
.color-swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.color-swatch { border-radius: 16px; }
.color-swatch-block { height: 80px; }
.color-swatch-info { padding: 10px 12px; background: rgba(255,255,255,.42); }
.color-swatch-name { font-size: 11px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px; }
.color-swatch-hex { font-size: 10px; color: var(--muted); font-family: ui-monospace, monospace; display: block; margin-bottom: 4px; }
.color-swatch-role { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

/* ── TYPOGRAPHY ── */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.type-card-sample { padding: 40px 32px; border-bottom: 1px solid var(--glass-line); min-height: 180px; display: flex; flex-direction: column; justify-content: flex-end; background: rgba(255,255,255,.4); }
.type-card-info { padding: 20px 24px; background: rgba(255,255,255,.34); }
.type-card-label { font-size: 9px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--emerald); margin-bottom: 8px; }
.type-card-name { font-size: 18px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
.type-card-note { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.5; }

/* ── IN USE ── */
.mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mockup-card { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--glass-line); box-shadow: var(--glass-shadow); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; position: relative; }
.mockup-card img { width: 100%; height: 100%; object-fit: cover; }
.mockup-card-empty { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.mockup-card-label { position: absolute; left: 16px; bottom: 14px; font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(14,42,24,.45); }
.mockup-card.has-img .mockup-card-label { color: rgba(255,255,255,.75); }
.mockup-placeholder-icon { font-size: 32px; opacity: .2; }
.mockup-placeholder-text { font-size: 12px; color: var(--muted); opacity: .7; }

/* ── USAGE ── */
.usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.usage-card-head { padding: 18px 22px; border-bottom: 1px solid var(--glass-line); display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.34); }
.usage-card-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.usage-card-icon.do { background: rgba(44,120,76,.16); color: var(--emerald); }
.usage-card-icon.dont { background: rgba(176,72,60,.14); color: #b0483c; }
.usage-card-head h3 { font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
.usage-card-head h3.do { color: var(--emerald); }
.usage-card-head h3.dont { color: #a8443a; }
.usage-list { padding: 8px 0; }
.usage-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 22px; border-bottom: 1px solid var(--glass-line); font-size: 13px; font-weight: 300; line-height: 1.5; color: var(--ink); }
.usage-item:last-child { border-bottom: 0; }
.usage-item-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.usage-item-dot.do { background: rgba(44,120,76,.18); color: var(--emerald); }
.usage-item-dot.dont { background: rgba(176,72,60,.12); color: #a8443a; }

/* ── DOWNLOADS ── */
.downloads-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.download-card { padding: 22px; display: flex; flex-direction: column; gap: 12px; }
.download-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(44,120,76,.10); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--emerald); }
.download-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.download-desc { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.5; flex: 1; }
.download-formats { display: flex; gap: 6px; flex-wrap: wrap; }
.download-format { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; background: rgba(44,120,76,.08); color: var(--emerald); border: 1px solid rgba(44,90,60,.12); }

/* ── FOOTER ── */
.guide-footer { margin-top: 84px; padding: 32px 0; border-top: 1px solid rgba(44,90,60,.10); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.guide-footer-brand { font-family: var(--sans); font-weight: 300; font-size: 18px; letter-spacing: -.02em; color: var(--muted); }
.guide-footer-note { font-size: 12px; font-weight: 300; color: rgba(14,42,24,.4); }

/* ── NOT FOUND ── */
.not-found { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 40px; position: relative; z-index: 1; }
.not-found h1 { font-family: var(--sans); font-size: 48px; font-weight: 200; letter-spacing: -.04em; color: var(--ink); }
.not-found p { color: var(--muted); font-weight: 300; font-size: 15px; max-width: 400px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; }
  .hero-panel { display: none; }
  .logo-grid { grid-template-columns: 1fr; }
  .type-grid, .usage-grid, .mockup-grid { grid-template-columns: 1fr; }
  .downloads-grid { grid-template-columns: 1fr 1fr; }
  .color-swatches { grid-template-columns: repeat(3, 1fr); }
  .guide { padding: 0 20px 80px; }
  .topbar { padding: 12px 20px; }
}
@media (max-width: 560px) {
  .color-swatches { grid-template-columns: repeat(2, 1fr); }
  .downloads-grid { grid-template-columns: 1fr; }
  .icon-row { grid-template-columns: 1fr 1fr; }
}

/* ── PRINT — flatten glass so the PDF stays crisp ── */
@media print {
  body::before { display: none; }
  body, .topbar { background: #fff; }
  .topbar-actions { display: none; }
  .logo-card, .icon-card, .type-card, .usage-card, .download-card, .color-swatch, .mockup-card,
  .logo-card-info, .icon-info, .color-swatch-info, .type-card-sample, .type-card-info, .usage-card-head {
    backdrop-filter: none; -webkit-backdrop-filter: none; box-shadow: none; background: #fff;
  }
}
</style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-brand" href="/guide.html">
    <span class="topbar-mark">M</span>
    Moving Day
  </a>
  <span class="topbar-client" id="topbarClient">Brand Guide</span>
  <div class="topbar-actions">
    <a class="topbar-btn" href="/guide.html">Edit in Builder</a>
    <button class="topbar-btn primary" onclick="window.print()">Print / PDF</button>
  </div>
</nav>

<div class="guide" id="guide"></div>

<script>
(function () {

  // ── LOAD DATA ──────────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || '';

  let data = null;

  // Try published guide first, then preview
  if (slug) {
    try { data = JSON.parse(localStorage.getItem(`mdGuide_${slug}`) || 'null'); } catch(e) {}
    if (!data) {
      try { data = JSON.parse(localStorage.getItem(`mdGuide_preview_${slug}`) || 'null'); } catch(e) {}
    }
  }

  // Also accept postMessage updates from the builder iframe
  window.addEventListener('message', event => {
    if (event.origin !== window.location.origin) return;
    const msg = event.data || {};
    if (msg.type === 'MD_GUIDE_PREVIEW_UPDATE' && msg.guide) {
      data = normalizeData(msg.guide);
      render(data);
    }
  });

  if (!data) {
    renderNotFound(slug);
    return;
  }

  data = normalizeData(data);
  render(data);

  // ── NORMALIZE ──────────────────────────────────────────────────────────────
  function normalizeData(raw) {
    // Handle both old format (colors as object) and new format (colors as array)
    let colors = [];
    if (Array.isArray(raw.colors)) {
      colors = raw.colors;
    } else if (raw.colors && typeof raw.colors === 'object') {
      const roles = ['Primary','Secondary','Accent','Light','Dark'];
      const keys = ['primary','secondary','softAccent','lightBase','deepBase'];
      colors = keys.map((k,i) => ({
        hex: raw.colors[k] || raw.colorsObject?.[k] || '#15140F',
        name: (raw.colorNames || '').split(',')[i]?.trim() || roles[i],
        role: roles[i]
      }));
    }

    const fonts = raw.fonts || {};
    return {
      name: raw.name || raw.clientName || 'Brand Guide',
      category: raw.category || 'Brand Identity',
      date: raw.date || '',
      sprint: raw.sprint || 'Brand Cleanup Sprint',
      assets: raw.assets || raw.assetCount || '',
      tagline: raw.tagline || '',
      displayFont: raw.displayFont || fonts.display || 'Instrument Serif',
      bodyFont: raw.bodyFont || fonts.body || 'Geist',
      displayFontNote: raw.displayFontNote || 'Use for headlines, signage, and major brand moments.',
      bodyFontNote: raw.bodyFontNote || 'Use for body copy, captions, labels, and all UI.',
      colors,
      images: raw.images || {},
      // Optional logo placement guidance from the AI (analyze-brand-files logoSystem).
      // Present when the guide data came through the concierge; absent for manual builds.
      logoSystem: raw.logoSystem || null,
      usageDo: raw.usageDo || ['Use approved logo versions only','Keep clear space around the logo','Use the primary color as the dominant brand color','Use accent colors sparingly and with purpose','Use the icon mark for favicons and tight placements'],
      usageDont: raw.usageDont || ['Do not stretch, rotate, or distort the logo','Do not place the logo on low-contrast backgrounds','Do not use colors outside the approved palette','Do not add shadows or effects to the logo','Do not mix in off-brand fonts'],
      downloads: raw.downloads || defaultDownloads(),
    };
  }

  function defaultDownloads() {
    return [
      { icon: '✦', title: 'Logo Suite', desc: 'Primary, secondary, and icon marks for web, print, and social use.', formats: ['SVG','PNG','PDF'] },
      { icon: '◈', title: 'Color Palette', desc: 'HEX, RGB, and CMYK references for the approved palette.', formats: ['PDF','PNG'] },
      { icon: '⬡', title: 'Social Assets', desc: 'Profile images, social graphics, and campaign templates.', formats: ['PNG','JPG'] },
      { icon: '▣', title: 'Print Files', desc: 'Business card, flyer, signage, and print-ready files.', formats: ['PDF','EPS'] },
      { icon: 'Aa', title: 'Font Files', desc: 'Brand fonts for internal use and vendor sharing.', formats: ['OTF','WOFF'] },
      { icon: '✎', title: 'Brand Guide PDF', desc: 'A PDF version of this guide for vendors and internal teams.', formats: ['PDF'] }
    ];
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function render(d) {
    document.title = `${d.name} · Brand Guide`;
    document.getElementById('topbarClient').textContent = d.name;

    // Apply CSS color vars
    if (d.colors.length >= 5) {
      const root = document.documentElement;
      root.style.setProperty('--c1', d.colors[0].hex);
      root.style.setProperty('--c2', d.colors[1].hex);
      root.style.setProperty('--c3', d.colors[2].hex);
      root.style.setProperty('--c4', d.colors[3].hex);
      root.style.setProperty('--c5', d.colors[4].hex);
    }

    const guide = document.getElementById('guide');
    guide.innerHTML = [
      renderHero(d),
      renderLogos(d),
      renderColors(d),
      renderTypography(d),
      renderInUse(d),
      renderUsage(d),
      renderDownloads(d),
      renderFooter(d)
    ].join('');

    // Make sure no logo sits on a background it would disappear into.
    enhanceLogoContrast(d);
  }

  // ── HERO ───────────────────────────────────────────────────────────────────
  function renderHero(d) {
    const logoImg = d.images?.heroLogo || d.images?.primaryLogo || '';
    const logoHTML = logoImg
      ? `<img src="${esc(logoImg)}" alt="${esc(d.name)} logo">`
      : `<span class="logo-placeholder">${esc(d.name)}</span>`;

    return `
      <section class="guide-section" style="border-top:0;margin-top:0">
        <div class="hero-grid">
          <div class="hero-copy">
            <div class="hero-tag">Brand Identity Guide · ${esc(d.sprint)}</div>
            <h1 class="hero-name">${esc(d.name)}</h1>
            ${d.tagline ? `<p class="hero-tagline">${esc(d.tagline)}</p>` : ''}
            <div class="hero-meta">
              ${d.category ? `<div class="hero-meta-item"><span class="hero-meta-label">Category</span><span class="hero-meta-value">${esc(d.category)}</span></div>` : ''}
              ${d.date ? `<div class="hero-meta-item"><span class="hero-meta-label">Delivered</span><span class="hero-meta-value">${esc(d.date)}</span></div>` : ''}
              ${d.assets ? `<div class="hero-meta-item"><span class="hero-meta-label">Assets</span><span class="hero-meta-value">${esc(d.assets)}</span></div>` : ''}
            </div>
          </div>
          <div class="hero-panel">
            <div class="hero-panel-logo">${logoHTML}</div>
            <div class="hero-panel-bottom">
              <span class="hero-panel-label">Guide type</span>
              <span class="hero-panel-sprint">${esc(d.sprint)}</span>
            </div>
          </div>
        </div>
      </section>`;
  }

  // ── LOGOS ──────────────────────────────────────────────────────────────────
  function renderLogos(d) {
    const imgs = d.images || {};
    const primaryImg = imgs.primaryLogo || imgs.heroLogo || '';
    const darkImg = imgs.primaryLogo || imgs.heroLogo || '';
    const brandImg = imgs.iconMark || imgs.iconVariant || '';
    const iconImg = imgs.iconMark || '';
    const variantImg = imgs.iconVariant || '';

    const logoCard = (imgSrc, bg, label, desc, tag) => {
      const imgHTML = imgSrc
        ? `<img src="${esc(imgSrc)}" alt="${esc(label)}">`
        : `<span class="logo-placeholder">${esc(label)}</span>`;
      return `
        <div class="logo-card">
          <div class="logo-card-stage ${bg}">${imgHTML}</div>
          <div class="logo-card-info">
            <div>
              <div class="logo-card-label">${esc(label)}</div>
              <div class="logo-card-desc">${esc(desc)}</div>
            </div>
            <span class="logo-card-tag">${esc(tag)}</span>
          </div>
        </div>`;
    };

    const iconCard = (imgSrc, bg, label) => {
      const imgHTML = imgSrc
        ? `<img src="${esc(imgSrc)}" alt="${esc(label)}">`
        : `<span class="logo-placeholder" style="font-size:11px">${esc(label)}</span>`;
      return `
        <div class="icon-card">
          <div class="icon-stage ${bg}">${imgHTML}</div>
          <div class="icon-info"><span>${esc(label)}</span></div>
        </div>`;
    };

    return `
      <section class="guide-section">
        <div class="section-kicker">Logo System</div>
        <h2 class="section-title">The mark</h2>
        <p class="section-desc">Primary logo, icon mark, and approved color variants for use across all applications.</p>
        <div class="logo-grid">
          ${logoCard(primaryImg, 'light', 'Primary', 'Websites, proposals, documents, and everyday brand use.', 'Light bg')}
          ${logoCard(darkImg, 'dark', 'On dark', 'Dark headers, reversed print, and brand-color placements.', 'Dark bg')}
        </div>
        <div class="icon-row" style="margin-top:16px">
          ${iconCard(iconImg, 'light', 'Icon mark')}
          ${iconCard(iconImg, 'dark', 'Dark variant')}
          ${iconCard(brandImg, 'brand', 'Brand color')}
        </div>
      </section>`;
  }

  // ── COLORS ─────────────────────────────────────────────────────────────────
  function renderColors(d) {
    const barSwatches = d.colors.map(c =>
      `<div class="color-bar-swatch" style="background:${esc(c.hex)}"><span>${esc(c.name||'')}</span></div>`
    ).join('');

    const swatchCards = d.colors.map(c => {
      const isDark = isColorDark(c.hex);
      return `
        <div class="color-swatch">
          <div class="color-swatch-block" style="background:${esc(c.hex)}"></div>
          <div class="color-swatch-info">
            <span class="color-swatch-name">${esc(c.name||'Color')}</span>
            <span class="color-swatch-hex">${esc(c.hex)}</span>
            <span class="color-swatch-role">${esc(c.role||'')}</span>
          </div>
        </div>`;
    }).join('');

    return `
      <section class="guide-section">
        <div class="section-kicker">Color System</div>
        <h2 class="section-title">The palette</h2>
        <p class="section-desc">The approved color set. Use these consistently across all brand touchpoints.</p>
        <div class="color-bar">${barSwatches}</div>
        <div class="color-swatches">${swatchCards}</div>
      </section>`;
  }

  // ── TYPOGRAPHY ─────────────────────────────────────────────────────────────
  function renderTypography(d) {
    return `
      <section class="guide-section">
        <div class="section-kicker">Typography</div>
        <h2 class="section-title">The type</h2>
        <p class="section-desc">Display and body typefaces. Use these for all brand communications.</p>
        <div class="type-grid">
          <div class="type-card">
            <div class="type-card-sample">
              <div style="font-family:'${esc(d.displayFont)}',Georgia,serif;font-size:clamp(40px,6vw,72px);font-weight:400;letter-spacing:-.05em;line-height:.9;color:var(--ink)">${esc(d.name)}</div>
            </div>
            <div class="type-card-info">
              <div class="type-card-label">Display</div>
              <div class="type-card-name">${esc(d.displayFont)}</div>
              <div class="type-card-note">${esc(d.displayFontNote)}</div>
            </div>
          </div>
          <div class="type-card">
            <div class="type-card-sample">
              <div style="font-family:'${esc(d.bodyFont)}',-apple-system,sans-serif;font-size:17px;line-height:1.65;color:var(--muted);max-width:340px">Clear usage notes, download labels, file descriptions, and practical brand guidance for every application.</div>
            </div>
            <div class="type-card-info">
              <div class="type-card-label">Body / UI</div>
              <div class="type-card-name">${esc(d.bodyFont)}</div>
              <div class="type-card-note">${esc(d.bodyFontNote)}</div>
            </div>
          </div>
        </div>
      </section>`;
  }

  // ── IN USE ─────────────────────────────────────────────────────────────────
  function renderInUse(d) {
    const imgs = d.images || {};
    const slots = [
      { key: 'profileImage', label: 'Profile', bg: 'var(--c1)' },
      { key: 'websiteHeader', label: 'Digital', bg: 'var(--c4)' },
      { key: 'businessCard', label: 'Print', bg: 'var(--c5)' },
      { key: 'socialPost', label: 'Social', bg: 'var(--c3)' }
    ];

    const cards = slots.map(s => {
      const img = imgs[s.key] || '';
      const hasImg = !!img;
      return `
        <div class="mockup-card ${hasImg?'has-img':''}" style="${!hasImg?`background:${s.bg}`:''}">
          ${hasImg
            ? `<img src="${esc(img)}" alt="${esc(s.label)} mockup">`
            : `<div class="mockup-card-empty"><span class="mockup-placeholder-icon">◻</span><span class="mockup-placeholder-text">${esc(s.label)}</span></div>`
          }
          <span class="mockup-card-label">${esc(s.label)}</span>
        </div>`;
    }).join('');

    return `
      <section class="guide-section">
        <div class="section-kicker">In Use</div>
        <h2 class="section-title">Applications</h2>
        <p class="section-desc">How the brand shows up across profile, digital, print, and social contexts.</p>
        <div class="mockup-grid">${cards}</div>
      </section>`;
  }

  // ── USAGE ──────────────────────────────────────────────────────────────────
  function renderUsage(d) {
    const doItems = d.usageDo.map(item => `
      <div class="usage-item">
        <span class="usage-item-dot do">✓</span>
        <span>${esc(item)}</span>
      </div>`).join('');

    const dontItems = d.usageDont.map(item => `
      <div class="usage-item">
        <span class="usage-item-dot dont">✕</span>
        <span>${esc(item)}</span>
      </div>`).join('');

    return `
      <section class="guide-section">
        <div class="section-kicker">Brand Rules</div>
        <h2 class="section-title">Usage guidance</h2>
        <p class="section-desc">Protect the identity system. These rules ensure the brand stays consistent across every use.</p>
        <div class="usage-grid">
          <div class="usage-card">
            <div class="usage-card-head">
              <span class="usage-card-icon do">✓</span>
              <h3 class="do">Always do</h3>
            </div>
            <div class="usage-list">${doItems}</div>
          </div>
          <div class="usage-card">
            <div class="usage-card-head">
              <span class="usage-card-icon dont">✕</span>
              <h3 class="dont">Never do</h3>
            </div>
            <div class="usage-list">${dontItems}</div>
          </div>
        </div>
      </section>`;
  }

  // ── DOWNLOADS ──────────────────────────────────────────────────────────────
  function renderDownloads(d) {
    const cards = d.downloads.map(dl => `
      <div class="download-card">
        <div class="download-icon">${esc(dl.icon||'✦')}</div>
        <div class="download-title">${esc(dl.title)}</div>
        <div class="download-desc">${esc(dl.desc)}</div>
        <div class="download-formats">
          ${(dl.formats||[]).map(f=>`<span class="download-format">${esc(f)}</span>`).join('')}
        </div>
      </div>`).join('');

    return `
      <section class="guide-section">
        <div class="section-kicker">File Handoff</div>
        <h2 class="section-title">Downloads</h2>
        <p class="section-desc">Everything included in the delivered brand package.</p>
        <div class="downloads-grid">${cards}</div>
      </section>`;
  }

  // ── FOOTER ─────────────────────────────────────────────────────────────────
  function renderFooter(d) {
    return `
      <footer class="guide-footer">
        <span class="guide-footer-brand">${esc(d.name)} · Brand Identity</span>
        <span class="guide-footer-note">Built with Moving Day Studio · ${d.date||new Date().getFullYear()}</span>
      </footer>`;
  }

  // ── NOT FOUND ──────────────────────────────────────────────────────────────
  function renderNotFound(slug) {
    document.getElementById('guide').innerHTML = `
      <div class="not-found">
        <h1>Guide not found</h1>
        <p>${slug ? `No published guide found for "${slug}". Publish it from the builder first.` : 'No slug provided. Add ?slug=your-client to the URL.'}</p>
        <a href="/guide.html" class="topbar-btn primary" style="margin-top:8px">Open Builder</a>
      </div>`;
  }

  // ── LOGO CONTRAST ────────────────────────────────────────────────────────
  // A logo must never disappear into its background. We read each logo's tone
  // (from the AI's logoSystem when the data carries it, otherwise sampled from
  // the image itself) and, only when it would actually clash with its stage:
  //   • a single-colour mark is knocked out to contrast (white on dark, black on light)
  //   • a full-colour logo is sat on a contrasting plate so its colours survive
  // Logos that already contrast are left exactly as they are.
  function enhanceLogoContrast(d) {
    const c1 = (d.colors && d.colors[0] && d.colors[0].hex) || '#1F3D2E';
    const CREAM = '#F1ECDF', INK = '#15140F';

    function stageBgFor(img) {
      if (img.closest('.hero-panel')) return c1;
      const stage = img.closest('.logo-card-stage, .icon-stage');
      if (!stage) return CREAM;
      if (stage.classList.contains('brand')) return c1;   // brand colour = primary (c1)
      if (stage.classList.contains('dark')) return INK;
      return CREAM;                                         // .light
    }

    // Optional tone hint from the AI for the main marks, keyed by image src.
    const ls = d.logoSystem || {};
    const toneBySrc = {};
    [['primaryLogo', d.images?.primaryLogo], ['heroLogo', d.images?.heroLogo],
     ['iconMark', d.images?.iconMark], ['wordmark', d.images?.iconVariant]]
      .forEach(([key, src]) => {
        if (!src) return;
        const node = ls[key] || (key === 'wordmark' ? ls.wordmark : null);
        if (node && node.tone) toneBySrc[src] = String(node.tone).toLowerCase();
      });

    document.querySelectorAll('.hero-panel-logo img, .logo-card-stage img, .icon-stage img')
      .forEach(img => applyLogoContrast(img, stageBgFor(img), toneBySrc[img.getAttribute('src') || '']));
  }

  function applyLogoContrast(img, bgHex, aiTone) {
    const place = info => {
      img.style.filter = '';
      img.style.background = '';
      img.style.padding = '';
      img.style.borderRadius = '';

      const tone = aiTone || info.tone;
      const bgDark = isColorDark(bgHex);
      const clash = (bgDark && tone === 'dark') || (!bgDark && tone === 'light');
      if (!clash) return; // already readable — keep the logo's true colours

      if (info.mono) {
        // single-colour mark → knock out to the opposite end so it always reads
        img.style.filter = bgDark ? 'brightness(0) invert(1)' : 'brightness(0)';
      } else {
        // full-colour logo → sit it on a contrasting plate instead of recolouring
        img.style.background = bgDark ? 'rgba(255,255,255,.94)' : 'rgba(21,20,15,.92)';
        img.style.padding = '8%';
        img.style.borderRadius = '12px';
      }
    };

    const src = img.getAttribute('src') || '';
    if (!src) return;
    // If the AI already told us the tone we still sample mono-vs-colour from pixels.
    analyzeLogoArt(src).then(place).catch(() => {});
  }

  // Sample a logo image: average luminance (dark/light/mixed) and how colourful it is.
  function analyzeLogoArt(src) {
    return new Promise(resolve => {
      const im = new Image();
      im.onload = () => {
        try {
          const w = Math.min(im.naturalWidth || 64, 64);
          const h = Math.min(im.naturalHeight || 64, 64);
          if (!w || !h) { resolve({ tone: 'mixed', mono: false }); return; }
          const cv = document.createElement('canvas');
          cv.width = w; cv.height = h;
          const ctx = cv.getContext('2d');
          ctx.drawImage(im, 0, 0, w, h);
          const px = ctx.getImageData(0, 0, w, h).data;
          let lum = 0, chroma = 0, n = 0;
          for (let i = 0; i < px.length; i += 4) {
            if (px[i + 3] < 24) continue;            // skip transparent pixels
            const r = px[i], g = px[i + 1], b = px[i + 2];
            lum += (r * 299 + g * 587 + b * 114) / 1000;
            chroma += Math.max(r, g, b) - Math.min(r, g, b);
            n++;
          }
          if (!n) { resolve({ tone: 'mixed', mono: false }); return; }
          const avgLum = lum / n, avgChroma = chroma / n;
          resolve({
            tone: avgLum < 110 ? 'dark' : (avgLum > 175 ? 'light' : 'mixed'),
            mono: avgChroma < 30                      // low colour spread = single-colour mark
          });
        } catch (e) {
          resolve({ tone: 'mixed', mono: false });    // tainted/unsampleable → leave as-is
        }
      };
      im.onerror = () => resolve({ tone: 'mixed', mono: false });
      im.src = src;
    });
  }

  // ── UTILS ──────────────────────────────────────────────────────────────────
  function esc(v) {
    return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
  }

  function isColorDark(hex) {
    const n = (hex||'').replace('#','');
    if (n.length !== 6) return false;
    const r=parseInt(n.slice(0,2),16), g=parseInt(n.slice(2,4),16), b=parseInt(n.slice(4,6),16);
    return (r*299+g*587+b*114)/1000 < 155;
  }

})();
</script>
